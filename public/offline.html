<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Tax Form Hub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .offline-container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    }
    .offline-icon {
      width: 80px;
      height: 80px;
      background: #e9ecef;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .offline-icon svg {
      width: 40px;
      height: 40px;
      color: #6c757d;
    }
    h1 {
      color: #212529;
      font-size: 24px;
      margin-bottom: 12px;
    }
    p {
      color: #6c757d;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .retry-btn {
      background: #0d6efd;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .retry-btn:hover {
      background: #0b5ed7;
    }
    .retry-btn:disabled {
      background: #6c757d;
      cursor: not-allowed;
    }
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid #ffffff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    .retry-btn.loading .spinner {
      display: inline-block;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m16.95 16.95L21 21" />
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Some features may be unavailable until you reconnect.</p>
    <button class="retry-btn" onclick="retryConnection()">
      <span class="spinner"></span>
      <span class="btn-text">Try Again</span>
    </button>
  </div>

  <script>
    function retryConnection() {
      const btn = document.querySelector('.retry-btn');
      const btnText = btn.querySelector('.btn-text');

      btn.classList.add('loading');
      btn.disabled = true;
      btnText.textContent = 'Checking...';

      // Try to fetch a small resource to check connectivity
      fetch('/manifest.json', { cache: 'no-store' })
        .then(() => {
          window.location.reload();
        })
        .catch(() => {
          btn.classList.remove('loading');
          btn.disabled = false;
          btnText.textContent = 'Try Again';
        });
    }

    // Auto-retry when coming back online
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
